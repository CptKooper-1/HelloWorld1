<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #000;
      --text: #f5f5f7;
      --accent: #2997ff;
      --subtle: rgba(255, 255, 255, 0.06);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      overflow: hidden;
    }

    /* ── Background gradient orbs ── */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0;
      animation: orbFloat 6s ease forwards;
    }

    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #1a1aff55, transparent 70%);
      top: -10%; left: -10%;
      animation-delay: 0.3s;
    }

    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #2997ff44, transparent 70%);
      bottom: -5%; right: -5%;
      animation-delay: 0.6s;
    }

    .orb-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #bf5af240, transparent 70%);
      top: 30%; left: 55%;
      animation-delay: 0.9s;
    }

    @keyframes orbFloat {
      0%   { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ── Noise texture overlay ── */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }

    /* ── Main stage ── */
    .stage {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 28px;
    }

    /* ── Eyebrow label ── */
    .eyebrow {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 1.0s forwards;
    }

    /* ── Hero headline ── */
    .headline {
      display: flex;
      gap: 0.05em;
      overflow: visible;
      padding: 0.1em 0.05em;
    }

    .headline .word {
      display: flex;
      overflow: visible;
    }

    .headline .char {
      display: inline-block;
      font-size: clamp(56px, 10vw, 130px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(
        160deg,
        #ffffff 0%,
        #ffffffcc 40%,
        #ffffff88 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      transform: translateY(100%);
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: clamp(17px, 2.2vw, 21px);
      font-weight: 400;
      color: rgba(255,255,255,0.56);
      letter-spacing: 0.01em;
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.9s forwards;
      text-align: center;
      max-width: 480px;
      line-height: 1.55;
    }

    /* ── CTA button ── */
    .cta-wrap {
      display: flex;
      gap: 16px;
      margin-top: 8px;
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 2.2s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 14px 28px;
      border-radius: 980px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
    }

    .btn:hover {
      transform: scale(1.04);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 30px #2997ff55;
    }

    .btn-primary:hover {
      box-shadow: 0 0 48px #2997ff88;
    }

    .btn-secondary {
      background: var(--subtle);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
    }

    /* ── Scroll hint ── */
    .scroll-hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      animation: fadeIn 1s ease 3s forwards;
      z-index: 2;
    }

    .scroll-hint span {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .scroll-mouse {
      width: 22px;
      height: 36px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 11px;
      display: flex;
      justify-content: center;
      padding-top: 6px;
    }

    .scroll-mouse::before {
      content: '';
      width: 3px;
      height: 7px;
      background: rgba(255,255,255,0.45);
      border-radius: 2px;
      animation: scrollDot 1.6s ease-in-out infinite;
    }

    @keyframes scrollDot {
      0%, 100% { transform: translateY(0); opacity: 1; }
      80%       { transform: translateY(10px); opacity: 0; }
    }

    /* ── Particle canvas ── */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Shared keyframes ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes charReveal {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="noise"></div>
  <canvas id="particles"></canvas>

  <main class="stage">
    <p class="eyebrow">Welcome to the future</p>

    <h1 class="headline" id="headline" aria-label="Hello World"></h1>

    <p class="subtitle">
      Designed for those who demand the extraordinary.<br>
      Crafted down to the last pixel.
    </p>

    <div class="cta-wrap">
      <a class="btn btn-primary" href="#">Get started</a>
      <a class="btn btn-secondary" href="#">Learn more ›</a>
    </div>
  </main>

  <div class="scroll-hint">
    <div class="scroll-mouse"></div>
    <span>Scroll</span>
  </div>

  <script>
    /* ────────────────────────────────────────────
       Character-by-character headline reveal
    ──────────────────────────────────────────── */
    (function () {
      const words = ["Hello", "\u00A0", "World"];
      const headline = document.getElementById("headline");
      let charIndex = 0;
      const totalDelay = 0.3; // seconds before first char
      const charStagger = 0.055;

      words.forEach((word) => {
        const wordEl = document.createElement("span");
        wordEl.className = "word";
        [...word].forEach((letter) => {
          const ch = document.createElement("span");
          ch.className = "char";
          ch.textContent = letter;
          const delay = totalDelay + charIndex * charStagger;
          ch.style.animation = `charReveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) ${delay}s forwards`;
          wordEl.appendChild(ch);
          charIndex++;
        });
        headline.appendChild(wordEl);
      });
    })();

    /* ────────────────────────────────────────────
       Particle field
    ──────────────────────────────────────────── */
    (function () {
      const canvas = document.getElementById("particles");
      const ctx = canvas.getContext("2d");
      let W, H, particles;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function randomBetween(a, b) {
        return a + Math.random() * (b - a);
      }

      function createParticles() {
        const count = Math.floor((W * H) / 14000);
        particles = Array.from({ length: count }, () => ({
          x: randomBetween(0, W),
          y: randomBetween(0, H),
          r: randomBetween(0.4, 1.6),
          dx: randomBetween(-0.12, 0.12),
          dy: randomBetween(-0.18, -0.04),
          alpha: randomBetween(0.1, 0.55),
          pulse: randomBetween(0, Math.PI * 2),
          pulseSpeed: randomBetween(0.005, 0.018),
        }));
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach((p) => {
          p.pulse += p.pulseSpeed;
          const a = p.alpha * (0.65 + 0.35 * Math.sin(p.pulse));
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${a})`;
          ctx.fill();

          p.x += p.dx;
          p.y += p.dy;

          if (p.y < -4) { p.y = H + 4; p.x = randomBetween(0, W); }
          if (p.x < -4) p.x = W + 4;
          if (p.x > W + 4) p.x = -4;
        });
        requestAnimationFrame(draw);
      }

      resize();
      createParticles();
      draw();
      window.addEventListener("resize", () => { resize(); createParticles(); });
    })();

    /* ────────────────────────────────────────────
       Subtle parallax on mouse move
    ──────────────────────────────────────────── */
    (function () {
      const orbs = document.querySelectorAll(".orb");
      document.addEventListener("mousemove", (e) => {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const dx = (e.clientX - cx) / cx;
        const dy = (e.clientY - cy) / cy;
        orbs.forEach((orb, i) => {
          const depth = (i + 1) * 14;
          orb.style.transform = `translate(${dx * depth}px, ${dy * depth}px) scale(1)`;
        });
      });
    })();
  </script>
</body>
</html>
